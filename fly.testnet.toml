app = 'px-test'
primary_region = 'cdg'

[build.args]
  VITE_TESTNET_URL = "https://px-test.fly.dev"
  VITE_MAINNET_URL = "https://px-mainnet.fly.dev"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1
  processes = ['app']

[env]
  DB_PATH = "/data/px.db"
  TEMPO_TESTNET = "true"
  PX_NETWORK = "testnet"

[mounts]
  source = "px_test_data"
  destination = "/data"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
