# fly.toml app configuration file generated for payload-exchange on 2026-03-19T19:13:56Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'payload-exchange'
primary_region = 'cdg'

[build]

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1
  processes = ['app']

[env]
  DB_PATH = "/data/px.db"

[mounts]
  source = "px_data"
  destination = "/data"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
